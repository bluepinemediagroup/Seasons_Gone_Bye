<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="display:flex;gap:10px;padding:16px;align-items:stretch">
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--court-spring);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">spring #2fc4a7</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--court-summer);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">summer #f0a12e</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--court-autumn);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">autumn #e0642f</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--court-winter);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">winter #7fb3d6</div></div>
<div style="width:1px;background:var(--night-border)"></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-pink);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">the Unseen — brand only</div></div>
</div>
<div style="padding:0 16px 14px;font:400 11px var(--font-mono);color:var(--text-low)">Dots are the only round shape in the system.</div></body></html>
