<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="display:flex;gap:10px;padding:16px">
<div style="flex:1;background:var(--night-0);box-shadow:0 0 0 1px var(--night-border);padding:12px;background-image:var(--wash-club)">
  <div style="font:500 10px var(--font-ui);letter-spacing:2px;color:var(--neon-teal-bright)">NIGHT</div>
  <div style="margin-top:6px;font:400 10.5px/1.6 var(--font-mono);color:var(--text-mid)">tiles · icons · social<br>--night-0 #07090b<br>--night-1 #0d1116<br>wash: --wash-club</div>
</div>
<div style="flex:1;background:var(--dusk-0);box-shadow:0 0 0 1px var(--dusk-border);padding:12px;background-image:var(--wash-twilight)">
  <div style="font:500 10px var(--font-ui);letter-spacing:2px;color:var(--neon-pink-bright)">TWILIGHT</div>
  <div style="margin-top:6px;font:400 10.5px/1.6 var(--font-mono);color:var(--text-mid)">the website<br>--dusk-0 #11141f<br>--dusk-1 #161a29<br>wash: --wash-twilight</div>
</div>
<div style="flex:1;background:var(--tealink-1);box-shadow:0 0 0 1px var(--tealink-border);padding:12px;background-image:var(--wash-tealink)">
  <div style="font:500 10px var(--font-ui);letter-spacing:2px;color:var(--neon-teal-bright)">TEAL INK</div>
  <div style="margin-top:6px;font:400 10.5px/1.6 var(--font-mono);color:var(--text-on-tealink)">posters · merch<br>--tealink-0 #0a1516<br>--tealink-1 #0e2422<br>wash: --wash-tealink</div>
</div>
</div></body></html>
