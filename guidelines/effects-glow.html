<!-- @dsCard group="Effects" viewport="700x220" subtitle="text-shadow for type, box-shadow for fills" name="Neon glow scale" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="padding:18px 20px;display:flex;flex-direction:column;gap:14px">
<div style="font:700 22px var(--font-display);color:var(--neon-pink-halo);text-shadow:var(--glow-pink)">--glow-pink</div>
<div style="font:700 22px var(--font-display);color:var(--neon-teal-halo);text-shadow:var(--glow-teal)">--glow-teal</div>
<div style="font:700 22px var(--font-display);color:var(--text-hi);text-shadow:var(--glow-dual)">--glow-dual</div>
<div style="display:flex;gap:14px"><span style="font:500 11px var(--font-ui);letter-spacing:2px;background:var(--neon-teal);color:var(--text-on-neon);padding:7px 16px;box-shadow:var(--glow-button-teal)">BUTTON GLOW</span><span style="font:500 11px var(--font-ui);letter-spacing:2px;background:var(--neon-pink);color:var(--text-on-neon);padding:7px 16px;box-shadow:var(--glow-button-pink)">BUTTON GLOW</span></div>
</div></body></html>
