<!-- @dsCard group="Effects" viewport="700x170" subtitle="One wash per surface, max two glowing elements" name="Atmospheric washes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="display:flex;gap:10px;padding:16px">
<div style="flex:1;height:110px;background:var(--night-0);background-image:var(--wash-club);box-shadow:0 0 0 1px var(--night-border);display:flex;align-items:flex-end;padding:8px"><span style="font:400 10px var(--font-mono);color:var(--text-mid)">--wash-club</span></div>
<div style="flex:1;height:110px;background:var(--dusk-0);background-image:var(--wash-twilight);box-shadow:0 0 0 1px var(--dusk-border);display:flex;align-items:flex-end;padding:8px"><span style="font:400 10px var(--font-mono);color:var(--text-mid)">--wash-twilight</span></div>
<div style="flex:1;height:110px;background:var(--dusk-1);background-image:var(--wash-card);box-shadow:0 0 0 1px var(--dusk-border);display:flex;align-items:flex-end;padding:8px"><span style="font:400 10px var(--font-mono);color:var(--text-mid)">--wash-card</span></div>
<div style="flex:1;height:110px;background:var(--tealink-1);background-image:var(--wash-tealink);box-shadow:0 0 0 1px var(--tealink-border);display:flex;align-items:flex-end;padding:8px"><span style="font:400 10px var(--font-mono);color:var(--text-on-tealink)">--wash-tealink</span></div>
</div></body></html>
