<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="display:flex;gap:14px;padding:16px">

  <div style="font:var(--text-label);letter-spacing:var(--tracking-label);color:var(--neon-teal-bright)">CARD</div>

</div>
<div style="flex:1;background:var(--dusk-1);border:1px solid var(--neon-pink);border-radius:var(--radius-1);box-shadow:var(--glow-button-pink);padding:14px">

  <div style="margin-top:6px;font:400 11px/1.6 var(--font-mono);color:var(--text-mid)">neon border + glow<br>radius-1 (2px) max</div>
