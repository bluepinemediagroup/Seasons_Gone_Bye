<!-- @dsCard group="Colors" viewport="700x150" subtitle="Pink + teal — the only two glows" name="Neon accents" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-body);background:var(--night-0);color:var(--text-hi)}</style></head><body>
<div style="display:flex;gap:10px;padding:16px">
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-pink-halo);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">pink-halo #fce6f2</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-pink-bright);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">pink-bright #f4a7cf</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-pink);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">neon-pink #e93f9b</div></div>
<div style="width:1px;background:var(--night-border)"></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-teal-halo);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">teal-halo #dcfaf2</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-teal-bright);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">teal-bright #7fd8c8</div></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--neon-teal);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">neon-teal #2fc4a7</div></div>
<div style="width:1px;background:var(--night-border)"></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:56px;background:var(--cream);box-shadow:0 0 0 1px rgba(255,255,255,.08)"></div><div style="font:400 10px var(--font-mono);color:var(--text-mid)">cream #f5efe4 (type only)</div></div>
</div></body></html>
