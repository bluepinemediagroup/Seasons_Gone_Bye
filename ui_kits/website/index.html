<!-- @startingPoint section="Website" subtitle="Seasons Gone Bye site — home + episode page" viewport="1440x900" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../../ds-fallback-loader.js"></script>
<style>html,body,#root{margin:0;height:100%}body{background:var(--dusk-0);font-family:var(--font-body)}
a{color:var(--link)}a:hover{color:var(--link-hover)}</style>
</head><body><div id="root"></div>
<script type="text/babel">
function App() {
  const [ns, setNs] = React.useState(null);
  const [view, setView] = React.useState({ page: 'home' });
  React.useEffect(() => {
    let done = false;
    bootSGB('../../', ['./Homepage.jsx', './EpisodePage.jsx'], v => v.Homepage && v.EpisodePage)
      .then(n => { if (!done) setNs(n); })
      .catch(e => console.error(e));
    return () => { done = true; };
  }, []);
  if (!ns) return <div style={{padding:24,font:'400 12px var(--font-mono)',color:'var(--text-low)'}}>bundle loading…</div>;
  const { Homepage, EpisodePage } = ns;
  return view.page === 'home'
    ? <Homepage onOpenEpisode={i => setView({ page: 'episode', index: i })} />
    : <EpisodePage index={view.index} onBack={() => setView({ page: 'home' })} onOpenEpisode={i => setView({ page: 'episode', index: i })} />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
